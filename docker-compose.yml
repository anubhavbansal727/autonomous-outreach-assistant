services:

  # -----------------------------------------------------------------------
  # Infrastructure
  # -----------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6380:6379"

  # -----------------------------------------------------------------------
  # Backend API (256 MB — no Playwright)
  # -----------------------------------------------------------------------

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "false"
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://crm:crm@postgres/crm
      REDIS_URL: redis://redis:6379
    command: >
      sh -c "
        uv run alembic upgrade head &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  # -----------------------------------------------------------------------
  # ARQ Worker (512 MB — needs Playwright for scraping)
  # -----------------------------------------------------------------------

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://crm:crm@postgres/crm
      REDIS_URL: redis://redis:6379
    command: uv run python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m

  # -----------------------------------------------------------------------
  # React Frontend (nginx, SPA fallback + /api proxy)
  # -----------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
